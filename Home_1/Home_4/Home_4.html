    <script>
        let lastTap = 0;
        const threshold = 350; // 두 번 탭 인식 시간(ms)

        document.addEventListener("click", (e) => {
            const now = Date.now();
            if (now - lastTap < threshold) {
                // 기존 dblclick 이벤트를 발생시켜 목차 페이지(next-screen)를 엽니다.
                window.dispatchEvent(new MouseEvent('dblclick'));
            }
            lastTap = now;
        }, { capture: true });
    </script>
